  <text x="210" y="158" fill="#202635" font-family="Arial, sans-serif" font-size="32" font-weight="700">Quality check</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#202635">
    <circle cx="222" cy="230" r="18" fill="#31c48d"/>
