<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">PowerPoint animation states converted to PDF pages</title>
  <desc id="desc">A presentation slide with animation steps turning into separate PDF pages for a printable handout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eefdf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="920" height="620" rx="40" fill="url(#bg)"/>
  <g filter="url(#shadow)">
